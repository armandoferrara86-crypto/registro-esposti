<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Esposti & Note — U.O. San Lorenzo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --surface3: #2d333b;
            --accent: #2563eb;
            --accent-light: #60a5fa;
            --text: #cdd9e5;
            --text-muted: #768390;
            --border: #30363d;
            --green: #3fb950;
            --green-bg: rgba(63,185,80,0.12);
            --green-border: rgba(63,185,80,0.25);
            --yellow: #d29922;
            --yellow-bright: #f0b429;
            --yellow-bg: rgba(210,153,34,0.12);
            --yellow-border: rgba(210,153,34,0.25);
            --orange: #e3612a;
            --orange-bg: rgba(227,97,42,0.12);
            --orange-border: rgba(227,97,42,0.25);
            --red: #f85149;
            --red-bg: rgba(248,81,73,0.12);
            --red-border: rgba(248,81,73,0.25);
            --gray: #768390;
            --gray-bg: rgba(118,131,144,0.1);
            --purple: #bc8cff;
            --purple-bg: rgba(188,140,255,0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        /* Firebase loading banner */
        #fb-banner { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 8px 16px; font-size: 12px; font-weight: 600; transition: transform 0.3s ease; }
        #fb-banner.connecting { background: rgba(37,99,235,0.95); color: #fff; }
        #fb-banner.error     { background: rgba(248,81,73,0.95); color: #fff; }
        #fb-banner.ok        { background: rgba(63,185,80,0.95); color: #fff; transform: translateY(-100%); }
        .fb-spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

        /* ─── HEADER ─── */
        .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 200; gap: 16px; }
        .header-brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .header-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
        .header-title span { color: var(--accent-light); }
        .header-unit { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; }
        .header-stats { display: flex; gap: 6px; align-items: center; }
        .hstat { display: flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
        .hstat:hover { opacity: 0.8; }
        .hstat-dot { width: 7px; height: 7px; border-radius: 50%; }
        .hstat.green { background: var(--green-bg); color: var(--green); }
        .hstat.yellow { background: var(--yellow-bg); color: var(--yellow-bright); }
        .hstat.orange { background: var(--orange-bg); color: var(--orange); }
        .hstat.red { background: var(--red-bg); color: var(--red); }

        /* ─── TABS ─── */
        .tabs { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; gap: 2px; }
        .tab { padding: 10px 14px; border: none; background: none; color: var(--text-muted); font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 6px; transition: color 0.15s; white-space: nowrap; }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent-light); border-bottom-color: var(--accent-light); }
        .tab-badge { background: var(--surface2); color: var(--text-muted); font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 10px; font-family: 'JetBrains Mono', monospace; }
        .tab.active .tab-badge { background: rgba(96,165,250,0.15); color: var(--accent-light); }

        /* ─── MAIN ─── */
        .main { padding: 20px; max-width: 1440px; margin: 0 auto; }

        /* ─── TOOLBAR ─── */
        .toolbar { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
        .search-wrap { flex: 1; min-width: 200px; position: relative; }
        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; pointer-events: none; }
        input.search { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 7px 12px 7px 32px; color: var(--text); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; }
        input.search:focus { border-color: var(--accent); }
        input.search::placeholder { color: var(--text-muted); }
        select.sel { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 7px 10px; color: var(--text); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; cursor: pointer; }
        select.sel:focus { border-color: var(--accent); }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; border: none; font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-ghost { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }
        .btn-ghost:hover { color: var(--text); background: var(--surface2); }
        .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
        .btn-danger:hover { background: rgba(248,81,73,0.2); }
        .btn-purple { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(188,140,255,0.25); }
        .btn-purple:hover { background: rgba(188,140,255,0.2); }
        .btn-sm { padding: 4px 10px; font-size: 12px; }

        /* ─── LEGEND ─── */
        .legend { display: flex; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
        .legend-bar { width: 3px; height: 14px; border-radius: 2px; }

        /* ─── TABLE ─── */
        .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--surface2); }
        th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; border-bottom: 1px solid var(--border); white-space: nowrap; user-select: none; }
        th.sortable { cursor: pointer; }
        th.sortable:hover { color: var(--text); }
        td { padding: 10px 12px; border-bottom: 1px solid rgba(48,54,61,0.6); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tbody tr { cursor: pointer; transition: background 0.1s; border-left: 3px solid transparent; }
        tbody tr:hover td { background: var(--surface2); }
        tbody tr.age-green { border-left-color: var(--green); }
        tbody tr.age-yellow { border-left-color: var(--yellow-bright); }
        tbody tr.age-orange { border-left-color: var(--orange); }
        tbody tr.age-red { border-left-color: var(--red); }
        tbody tr.age-gray { border-left-color: var(--gray); opacity: 0.55; }

        /* ─── BADGES ─── */
        .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500; white-space: nowrap; }
        .age-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
        .age-pill.green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
        .age-pill.yellow { background: var(--yellow-bg); color: var(--yellow-bright); border: 1px solid var(--yellow-border); }
        .age-pill.orange { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
        .age-pill.red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); animation: pulse-red 2s ease-in-out infinite; }
        .age-pill.gray { background: var(--gray-bg); color: var(--gray); }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
        .stato-badge { border-radius: 4px; }
        .stato-in_carico { background: rgba(96,165,250,0.12); color: #60a5fa; }
        .stato-in_lavorazione { background: rgba(240,180,41,0.12); color: #f0b429; }
        .stato-sospeso { background: rgba(227,97,42,0.12); color: #fb923c; }
        .stato-trasmesso { background: rgba(188,140,255,0.12); color: var(--purple); }
        .stato-chiuso { background: var(--gray-bg); color: var(--gray); }
        .prio-urgente { color: var(--red); font-weight: 700; }
        .prio-alta { color: var(--orange); font-weight: 600; }
        .prio-media { color: var(--yellow-bright); }
        .prio-bassa { color: var(--gray); }
        .area-badge { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); font-size: 10px; padding: 2px 6px; border-radius: 3px; }
        .scad-warn { color: var(--orange); font-size: 11px; }
        .scad-crit { color: var(--red); font-size: 11px; font-weight: 600; }

        /* ─── EMPTY ─── */
        .empty { padding: 60px 20px; text-align: center; color: var(--text-muted); }
        .empty .icon { font-size: 36px; margin-bottom: 12px; }
        .empty h3 { color: var(--text); font-size: 15px; margin-bottom: 6px; }

        /* ─── MODAL ─── */
        .overlay { position: fixed; inset: 0; background: rgba(1,4,9,0.78); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(4px); animation: fadeIn 0.15s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 700px; max-height: 92vh; overflow-y: auto; animation: slideUp 0.2s ease; }
        .modal.wide { max-width: 860px; }
        .modal-head { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 1; }
        .modal-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .modal-body { padding: 22px; }
        .modal-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
        .close-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; padding: 2px 6px; border-radius: 4px; line-height: 1; }
        .close-btn:hover { color: var(--text); background: var(--surface2); }

        /* ─── FORM ─── */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.span2 { grid-column: 1 / -1; }
        .form-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        input.fi, select.fi, textarea.fi { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px 11px; color: var(--text); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s; width: 100%; }
        input.fi:focus, select.fi:focus, textarea.fi:focus { border-color: var(--accent); }
        input.fi::placeholder, textarea.fi::placeholder { color: var(--text-muted); }
        textarea.fi { resize: vertical; min-height: 72px; }

        /* ─── DASHBOARD ─── */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
        .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
        .kpi-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px; }
        .kpi-value { font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; }
        .kpi-sub { font-size: 12px; color: var(--text-muted); }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .dash-card-head { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; background: var(--surface2); }
        .dash-card-body { padding: 16px; }
        .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 12px; }
        .bar-label { min-width: 130px; color: var(--text-muted); font-size: 12px; }
        .bar-track { flex: 1; background: var(--surface2); border-radius: 3px; height: 7px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
        .bar-count { min-width: 20px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }

        /* ─── AI TAB ─── */
        .ai-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        /* API key banner */
        .apikey-banner { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .apikey-banner.ok { border-color: var(--green-border); background: var(--green-bg); }
        .apikey-banner.missing { border-color: var(--yellow-border); background: var(--yellow-bg); }
        .apikey-label { font-size: 12px; font-weight: 600; color: var(--text); flex-shrink: 0; }
        .apikey-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .apikey-input-wrap { display: flex; gap: 8px; flex: 1; min-width: 260px; align-items: center; }
        .apikey-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 7px 11px; color: var(--text); font-size: 13px; font-family: 'JetBrains Mono', monospace; flex: 1; outline: none; letter-spacing: 0.5px; }
        .apikey-input:focus { border-color: var(--accent); }
        .apikey-status { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 5px; }
        .apikey-status.ok { color: var(--green); background: var(--green-bg); }
        .apikey-status.miss { color: var(--yellow-bright); background: var(--yellow-bg); }
        .ai-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .ai-card.full { grid-column: 1 / -1; }
        .ai-card-head { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface2); }
        .ai-card-title { font-size: 13px; font-weight: 600; }
        .ai-card-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .ai-card-body { padding: 16px; }
        /* Email import layout */
        .email-import-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 700px) { .email-import-layout { grid-template-columns: 1fr; } }
        /* Estratto campi */
        .email-extracted { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 14px; }
        .email-extracted-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px; }
        .exf { margin-bottom: 10px; }
        .exf-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 3px; }
        .exf-value { font-size: 13px; color: var(--text); line-height: 1.4; }
        .exf-badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 5px; font-size: 11px; font-weight: 600; border: 1px solid; }
        /* Strategia */
        .strategia-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
        .strat-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .strat-title { font-size: 13px; font-weight: 700; color: var(--text); }
        .strat-rischio { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 4px; border: 1px solid; }
        .rischio-alto { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
        .rischio-medio { background: var(--yellow-bg); color: var(--yellow-bright); border-color: var(--yellow-border); }
        .rischio-basso { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
        .strat-agenti { background: var(--surface3); border-radius: 7px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; }
        .strat-agenti-num { font-size: 28px; font-weight: 800; color: var(--accent-light); font-family: 'JetBrains Mono', monospace; line-height: 1; }
        .strat-agenti-info { flex: 1; }
        .strat-agenti-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
        .strat-agenti-desc { font-size: 12px; color: var(--text); margin-top: 2px; }
        .strat-timing { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .strat-timing-item { background: var(--surface3); border-radius: 6px; padding: 8px 11px; }
        .strat-timing-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 2px; }
        .strat-timing-value { font-size: 12px; color: var(--text); font-weight: 600; }
        .strat-azioni { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
        .strat-azione { display: flex; align-items: flex-start; gap: 9px; background: var(--surface3); border-radius: 6px; padding: 8px 11px; font-size: 12px; line-height: 1.45; color: var(--text); }
        .strat-azione-num { background: var(--accent); color: #fff; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
        .strat-norma { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; background: var(--surface3); border-radius: 5px; padding: 5px 9px; }
        .email-cta { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
        /* Send email modal */
        .send-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 620px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.2s ease; }
        .officer-check { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
        .officer-check:hover { background: var(--surface2); }
        .officer-check input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
        .officer-name { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
        .officer-email-input { background: var(--surface3); border: 1px solid var(--border); border-radius: 5px; padding: 4px 8px; color: var(--text-muted); font-size: 11px; font-family: 'JetBrains Mono', monospace; width: 220px; outline: none; }
        .officer-email-input:focus { border-color: var(--accent); color: var(--text); }
        .send-preview { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 12px; line-height: 1.6; white-space: pre-wrap; max-height: 180px; overflow-y: auto; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
        .send-note { background: var(--yellow-bg); border: 1px solid var(--yellow-border); border-radius: 7px; padding: 10px 14px; font-size: 12px; color: var(--yellow-bright); line-height: 1.5; }
        .ai-result { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 12px; font-size: 12px; line-height: 1.65; min-height: 90px; margin-top: 10px; white-space: pre-wrap; color: var(--text); font-family: 'JetBrains Mono', monospace; }
        /* PDF drop zone */
        .pdf-dropzone { border: 2px dashed var(--border); border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: border-color 0.2s, background 0.2s; background: var(--surface2); margin-bottom: 8px; }
        .pdf-dropzone:hover, .pdf-dropzone.drag-over { border-color: var(--accent); background: rgba(37,99,235,0.08); }
        .pdf-dropzone.loading { border-color: var(--yellow); background: rgba(210,153,34,0.08); cursor: default; }
        .pdf-dropzone.success { border-color: var(--green); background: rgba(63,185,80,0.08); }
        .pdf-dropzone.error { border-color: var(--red); background: rgba(248,81,73,0.08); }
        .pdf-icon { font-size: 22px; flex-shrink: 0; }
        .pdf-info { flex: 1; min-width: 0; }
        .pdf-label { font-size: 12px; font-weight: 600; color: var(--text); }

// PDF EXTRACTION
// ══════════════════════════════════════════════════════
(function() {
    if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
})();

async function extractPdfText(file, onProgress) {
    if (!window.pdfjsLib) throw new Error('PDF.js non disponibile');
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    const total = pdf.numPages;
    for (let i = 1; i <= total; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const pageText = content.items.map(item => item.str).join(' ').replace(/\s+/g, ' ').trim();
        if (pageText) fullText += (fullText ? '\n' : '') + pageText;
        if (onProgress) onProgress(i / total);
    }
    return fullText.trim();
}

async function pdfLoad(input, dropId, labelId, subId, clearId, progressId, barId, targetId) {
    const file = input.files[0];
    if (!file) return;
    const drop = document.getElementById(dropId);
    const label = document.getElementById(labelId);
    const sub = document.getElementById(subId);
    const clearBtn = document.getElementById(clearId);
    const progressWrap = document.getElementById(progressId);
    const bar = document.getElementById(barId);
    const target = document.getElementById(targetId);

    // Stato: caricamento
    drop.classList.remove('success', 'error');
    drop.classList.add('loading');
    label.textContent = '⏳ Estrazione testo in corso…';
    sub.textContent = file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)';
    progressWrap.style.display = 'block';
    bar.style.width = '5%';
    clearBtn.style.display = 'none';

    try {
        const text = await extractPdfText(file, (pct) => {
            bar.style.width = Math.round(pct * 100) + '%';
        });
        bar.style.width = '100%';
        if (!text || text.length < 20) {
            throw new Error('Il PDF non contiene testo estraibile (potrebbe essere scansionato senza OCR).');
        }
        // Successo
        setTimeout(() => {
            drop.classList.remove('loading');
            drop.classList.add('success');
            label.textContent = '✅ ' + file.name;
            sub.textContent = text.length.toLocaleString('it-IT') + ' caratteri estratti — ' + file.name.replace(/^.+[/\\]/, '');
            progressWrap.style.display = 'none';
            bar.style.width = '0%';
            clearBtn.style.display = 'flex';
            target.value = text;
            target.dispatchEvent(new Event('input'));
        }, 300);
    } catch (err) {
        drop.classList.remove('loading');
        drop.classList.add('error');
        label.textContent = '❌ Errore estrazione';
        sub.textContent = err.message || 'Riprova con un altro file';
        progressWrap.style.display = 'none';
        bar.style.width = '0%';
        clearBtn.style.display = 'flex';
        input.value = '';
    }
}

function pdfClear(evt, dropId, labelId, subId, clearId, targetId, inputId) {
    evt.stopPropagation();
    const drop = document.getElementById(dropId);
    const label = document.getElementById(labelId);
    const sub = document.getElementById(subId);
    const clearBtn = document.getElementById(clearId);
    const target = document.getElementById(targetId);
    const input = document.getElementById(inputId);
    drop.classList.remove('loading', 'success', 'error');
    clearBtn.style.display = 'none';
    input.value = '';
    const defaults = {
        'pdf-classify-drop': ['Trascina un PDF qui oppure clicca per sfogliare', 'Il testo viene estratto automaticamente e inserito nel campo sottostante'],
        'pdf-email-drop':    ['Trascina il PDF dell\'atto/esposto qui', 'Supporta atti protocollati, esposti scansionati con OCR, note di servizio'],
    };
    const [dl, ds] = defaults[dropId] || ['Carica PDF per estrarre testo automaticamente', 'Supporta atti protocollati, esposti, note scansionate con OCR'];
    label.textContent = dl;
    sub.textContent = ds;
    target.value = '';
}

function pdfDrop(evt, dropId, targetId) {
    evt.preventDefault();

    const file = evt.dataTransfer.files[0];
    if (!file || file.type !== 'application/pdf') {

    const map = {
        'pdf-classify-drop': { input:'pdf-classify-input', label:'pdf-classify-label', sub:'pdf-classify-sub', clear:'pdf-classify-clear', prog:'pdf-classify-progress', bar:'pdf-classify-bar' },
        'pdf-email-drop':    { input:'pdf-email-input',    label:'pdf-email-label',    sub:'pdf-email-sub',    clear:'pdf-email-clear',    prog:'pdf-email-progress',    bar:'pdf-email-bar'    },
        'pdf-form-drop':     { input:'pdf-form-input',     label:'pdf-form-label',     sub:'pdf-form-sub',     clear:'pdf-form-clear',     prog:'pdf-form-progress',     bar:'pdf-form-bar'     },
        'pdf-bulk-drop':     { input:'pdf-bulk-input',     label:'pdf-bulk-label',     sub:'pdf-bulk-sub',     clear:'pdf-bulk-clear',     prog:'pdf-bulk-progress',     bar:'pdf-bulk-bar'     },
        'pdf-scan-drop':     { input:'pdf-scan-input',     label:'pdf-scan-label',     sub:'pdf-scan-sub',     clear:'pdf-scan-clear',     prog:'pdf-scan-progress',     bar:'pdf-scan-bar'     },
    };
    const m = map[dropId] || map['pdf-form-drop'];
    const dt = new DataTransfer();
    dt.items.add(file);
    const inputEl = document.getElementById(m.input);
    inputEl.files = dt.files;
    pdfLoad(inputEl, dropId, m.label, m.sub, m.clear, m.prog, m.bar, targetId);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }
function daysAgo(dateStr) {
    if (!dateStr) return 0;
    return Math.floor((new Date() - new Date(dateStr)) / 86400000);
}
function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}
function getAgeInfo(e) {
    if (['chiuso', 'trasmesso'].includes(e.stato)) return { color: 'gray', label: 'Chiuso', days: null };
    const days = daysAgo(e.data_arrivo);
    if (days <= 15) return { color: 'green', label: `${days}gg`, days };
    if (days <= 30) return { color: 'yellow', label: `${days}gg`, days };
    if (days <= 60) return { color: 'orange', label: `${days}gg`, days };
    return { color: 'red', label: `${days}gg ⚠`, days };
}
function getScadenzaInfo(e) {
    if (!e.data_scadenza || ['chiuso', 'trasmesso'].includes(e.stato)) return null;
    const days = Math.floor((new Date(e.data_scadenza) - new Date()) / 86400000);
    if (days < 0) return { cls: 'scad-crit', label: `Scad. ${Math.abs(days)}gg fa` };
    if (days <= 7) return { cls: 'scad-warn', label: `Scad. tra ${days}gg` };
    return null;
}
function getFiltered() {
    let list = [...state.esposti];
    const { q, stato, area, tipo } = state.filter;
    if (q) {
        const lq = q.toLowerCase();
        list = list.filter(e =>
            (e.oggetto||'').toLowerCase().includes(lq) ||
            (e.mittente||'').toLowerCase().includes(lq) ||
            (e.indirizzo||'').toLowerCase().includes(lq) ||
            (e.numero_protocollo||'').toLowerCase().includes(lq) ||
            (e.assegnato_a||'').toLowerCase().includes(lq) ||
            (e.note_interne||'').toLowerCase().includes(lq)
        );
    }
    if (stato) list = list.filter(e => e.stato === stato);
    if (area)  list = list.filter(e => e.area === area);
    if (tipo)  list = list.filter(e => e.tipo === tipo);
    list.sort((a, b) => {
        let va = a[state.sort.field] || '';
        let vb = b[state.sort.field] || '';
        if (va < vb) return state.sort.dir === 'asc' ? -1 : 1;
        if (va > vb) return state.sort.dir === 'asc' ? 1 : -1;
        return 0;
    });
    return list;
}
function getOpenCounts() {
    const counts = { green: 0, yellow: 0, orange: 0, red: 0 };
    state.esposti.filter(e => !['chiuso','trasmesso'].includes(e.stato))
        .forEach(e => { counts[getAgeInfo(e).color]++; });
    return counts;
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function addEsposto(data) {
    const now = new Date();
    const firstLog = [{ id: uid(), data: now.toISOString().split('T')[0], ora: now.toTimeString().slice(0,5), tipo: 'apertura', descrizione: 'Pratica aperta nel registro.', autore: data.assegnato_a || 'Armando Ferrara' }];
    const docData = { ...data, log: firstLog, data_creazione: now.toISOString(), data_modifica: now.toISOString(), data_chiusura: null };
    try { await db.collection(COL).doc(uid()).set(docData); closeModal(); }
    catch(err) { alert('Errore salvataggio: ' + err.message); }
}
async function updateEsposto(id, data) {
    const existing = state.esposti.find(e => e.id === id);
    if (!existing) return;
    const wasOpen = !['chiuso','trasmesso'].includes(existing.stato);
    const nowClosed = ['chiuso','trasmesso'].includes(data.stato);
    const updates = { ...data, data_modifica: new Date().toISOString(), data_chiusura: (wasOpen && nowClosed) ? new Date().toISOString() : (existing.data_chiusura || null) };
    try { await db.collection(COL).doc(id).update(updates); closeModal(); }
    catch(err) { alert('Errore aggiornamento: ' + err.message); }
}
async function deleteEsposto(id) {
    if (!confirm('Eliminare definitivamente questo elemento?')) return;
    try { await db.collection(COL).doc(id).delete(); closeModal(); }
    catch(err) { alert('Errore eliminazione: ' + err.message); }
}

function switchTab(tab) {
    state.tab = tab;
    ['registro','dashboard','ai'].forEach(t => {
        document.getElementById(`view-${t}`).style.display = t === tab ? 'block' : 'none';
        document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    });
    if (tab === 'dashboard') renderDashboard();
    if (tab === 'ai') renderAI();
}

function sortBy(f) {
    state.sort.dir = state.sort.field===f ? (state.sort.dir==='asc'?'desc':'asc') : 'desc';
    state.sort.field = f;
    renderRegistro();
}
function clearFilters() { state.filter = { q:'', stato:'', area:'', tipo:'' }; renderRegistro(); }

function renderDashboard() {
    const all = state.esposti;
    const open = all.filter(e => !['chiuso','trasmesso'].includes(e.stato));
    const counts = getOpenCounts();
    const avgDays = open.length ? Math.round(open.reduce((s,e)=>s+daysAgo(e.data_arrivo),0)/open.length) : 0;
    const scadute = open.filter(e => e.data_scadenza && new Date(e.data_scadenza)<new Date()).length;

    const byArea = {};
    open.forEach(e => { byArea[e.area] = (byArea[e.area]||0)+1; });
    const maxA = Math.max(...Object.values(byArea), 1);
    const areaRows = Object.entries(byArea).sort((a,b)=>b[1]-a[1])
        .map(([a,c]) => `<div class="bar-row"><div class="bar-label">${AREAS[a]||a}</div><div class="bar-track"><div class="bar-fill" style="width:${(c/maxA*100).toFixed(0)}%;background:${AREA_COLORS[a]||'#94a3b8'}"></div></div><div class="bar-count">${c}</div></div>`).join('');

    const byOff = {};
    open.forEach(e => { const k=e.assegnato_a||'N.A.'; byOff[k]=(byOff[k]||0)+1; });
    const maxO = Math.max(...Object.values(byOff), 1);
    const offRows = Object.entries(byOff).sort((a,b)=>b[1]-a[1])
        .map(([o,c]) => `<div class="bar-row"><div class="bar-label" style="min-width:140px">${esc(o)}</div><div class="bar-track"><div class="bar-fill" style="width:${(c/maxO*100).toFixed(0)}%;background:var(--accent-light)"></div></div><div class="bar-count">${c}</div></div>`).join('');

    const byStato = {};
    all.forEach(e => { byStato[e.stato]=(byStato[e.stato]||0)+1; });
    const statoRows = Object.entries(byStato).map(([s,c]) =>
        `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
            <span class="badge stato-badge stato-${s}">${STATI[s]}</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:12px">${c}</span>
        </div>`).join('');

    const critRows = open.filter(e=>getAgeInfo(e).color==='red').slice(0,6)
        .map(e => `<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer" onclick="openDetail('${e.id}')">
            <span class="age-pill red">${daysAgo(e.data_arrivo)}gg</span>
            <div style="flex:1;min-width:0"><div style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.oggetto)}</div><div style="font-size:11px;color:var(--text-muted)">${esc(e.numero_protocollo)} · ${esc(e.assegnato_a)}</div></div>
        </div>`).join('') || '<div style="color:var(--text-muted);font-size:13px;padding:12px 0">✅ Nessuna pratica critica</div>';

    const scadRows = open.filter(e=>e.data_scadenza).sort((a,b)=>new Date(a.data_scadenza)-new Date(b.data_scadenza)).slice(0,6)
        .map(e => {
            const d = Math.floor((new Date(e.data_scadenza)-new Date())/86400000);
            const cls = d<0?'red':d<=7?'orange':'yellow';
            return `<div style="padding:7px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer" onclick="openDetail('${e.id}')">
                <span class="age-pill ${cls}" style="min-width:80px;justify-content:center">${d<0?Math.abs(d)+'gg fa':'fra '+d+'gg'}</span>
                <div style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.oggetto)}</div>
            </div>`;
        }).join('') || '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">Nessuna scadenza impostata</div>';

    document.getElementById('view-dashboard').innerHTML = `
        <div class="kpi-grid">
            <div class="kpi"><div class="kpi-label">Aperti</div><div class="kpi-value" style="color:var(--accent-light)">${open.length}</div><div class="kpi-sub">su ${all.length} totali</div></div>
            <div class="kpi"><div class="kpi-label">Giacenza media</div><div class="kpi-value" style="color:var(--yellow-bright)">${avgDays}gg</div><div class="kpi-sub">per pratica aperta</div></div>
            <div class="kpi"><div class="kpi-label">Critici (&gt;60gg)</div><div class="kpi-value" style="color:var(--red)">${counts.red}</div><div class="kpi-sub">richiedono azione</div></div>
            <div class="kpi"><div class="kpi-label">Scad. superate</div><div class="kpi-value" style="color:var(--orange)">${scadute}</div><div class="kpi-sub">oltre il termine</div></div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
            <div class="age-pill green" style="padding:5px 12px;font-size:12px">🟢 ${counts.green} regolari (0-15gg)</div>
            <div class="age-pill yellow" style="padding:5px 12px;font-size:12px">🟡 ${counts.yellow} attenzione (16-30gg)</div>
            <div class="age-pill orange" style="padding:5px 12px;font-size:12px">🟠 ${counts.orange} urgenti (31-60gg)</div>
            <div class="age-pill red" style="padding:5px 12px;font-size:12px">🔴 ${counts.red} critici (&gt;60gg)</div>
        </div>
        <div class="dashboard-grid">

            <div class="dash-card"><div class="dash-card-head">📅 Scadenzario</div><div class="dash-card-body">${scadRows}</div></div>
            <div class="dash-card"><div class="dash-card-head">Stato pratiche (archivio completo)</div><div class="dash-card-body">${statoRows}</div></div>
        </div>`;
}

async function callClaude(userMsg, systemExtra, history) {

    const _k2 = 'api03-U-uIIWYik37oGAPWrzEe13a9FS5ZMIjEwnU7b6Dghjg2w5SOp0wOLJhgLlp50G2A1I7o0rESSV1do';

    const all_summary = `Aperte: ${open.length}/${state.esposti.length}. Chiuse: ${state.esposti.filter(e=>e.stato==='chiuso').length}. Trasmesse: ${state.esposti.filter(e=>e.stato==='trasmesso').length}.`;

    const prompts = {
        pattern: `Analizza il registro pratiche e identifica: zone geografiche ricorrenti, tipologie più frequenti, mittenti/operatori ripetuti, pattern temporali, aree di criticità sistemica. Sii specifico e operativo.\n\nREGISTRO APERTE:\n${summary}`,
        carico: `Analizza la distribuzione del carico di lavoro tra gli agenti. Valuta equità, bilanciamento per priorità e anzianità, e formula raccomandazioni concrete per redistribuzione se necessario.\n\nREGISTRO:\n${summary}`,
        scadenze: `Analizza le urgenze per anzianità. Identifica pratiche oltre i termini L. 241/1990 (30gg), rischio responsabilità erariale/disciplinare, e proponi un piano di priorità concreto per la settimana corrente con ordine di intervento.\n\nREGISTRO:\n${summary}`,
        report: `Genera un REPORT SETTIMANALE formale per il Comandante Cap. Gennaro Chianese, Polizia Municipale Napoli U.O. San Lorenzo. Formato: intestazione, sommario statistico, criticità, azioni in corso, raccomandazioni. Tono istituzionale.\n\nDATI:\n${all_summary}\nREGISTRO APERTE:\n${summary}`,
        duplicati: `Analizza il registro e identifica: pratiche correlate (stesso indirizzo/operatore/tipologia), possibili duplicati, eventi che potrebbero essere connessi non ovviamente. Segnala il numero protocollo di ciascun elemento correlato.\n\nREGISTRO:\n${summary}`,
        normativa: `Analizza le aree normative coperte dal registro e identifica: quale normativa viene applicata più spesso, quali aree potrebbero essere sotto-monitorate, gap operativi, suggerimenti per future campagne di vigilanza tematica.\n\nREGISTRO:\n${summary}`,
    };
    try {
        const txt = await callClaude(prompts[type]);
        res.className = 'ai-result';
        res.textContent = txt;
    } catch(err) {
        res.className = 'ai-result';
        res.textContent = '❌ ' + err.message;
    }
}

async function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    const msgs = document.getElementById('chat-msgs');
    msgs.innerHTML += `<div class="chat-msg user">${esc(msg)}</div>`;
    const loadEl = document.createElement('div');
    loadEl.className = 'chat-msg ai';
    loadEl.innerHTML = '<span class="spinner"></span>';
    msgs.appendChild(loadEl);
    msgs.scrollTop = msgs.scrollHeight;
    chatHistory.push({ role: 'user', content: msg });
    const open = state.esposti.filter(e=>!['chiuso','trasmesso'].includes(e.stato));
    const ctx = `REGISTRO CORRENTE (${open.length} pratiche aperte su ${state.esposti.length} totali):\n` +
        open.slice(0,12).map(e=>`[${e.numero_protocollo||'?'}] ${e.tipo}/${e.area}/${e.priorita}/${daysAgo(e.data_arrivo)}gg - "${e.oggetto}"`).join('\n');
    try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: AI_SYSTEM + '\n\n' + ctx, messages: chatHistory.slice(-12) })
        });
        const data = await resp.json();
        if (data.error) throw new Error(data.error.message);
        const reply = data.content[0].text;
        chatHistory.push({ role: 'assistant', content: reply });
        loadEl.textContent = reply;
    } catch(err) {
        loadEl.textContent = '❌ ' + err.message;
    }
    msgs.scrollTop = msgs.scrollHeight;
}

async function addLogEntry(espostoId) {
    const e = state.esposti.find(x => x.id === espostoId);
    if (!e) return;
    const data   = document.getElementById('log-data').value;
    const ora    = document.getElementById('log-ora').value;
    const tipo   = document.getElementById('log-tipo').value;
    const autore = document.getElementById('log-autore').value;
    const desc   = document.getElementById('log-desc').value.trim();
    if (!desc) { alert('Inserisci una descrizione per la voce.'); return; }
    const newLog = [...(e.log || []), { id: uid(), data, ora, tipo, autore, descrizione: desc }];
    // Aggiorna locale immediatamente per UI reattiva
    e.log = newLog;
    e.data_modifica = new Date().toISOString();
    // Aggiorna timeline in-place
    const logSorted = newLog.slice().sort((a,b) => (a.data+a.ora) < (b.data+b.ora) ? -1 : 1);
    const renderEntry = (entry, isLast) => {
        const t = LOG_TIPI[entry.tipo] || LOG_TIPI.annotazione;
        return `<div class="tl-entry ${t.cls}">
            <div class="tl-dot-col">
                <div class="tl-dot">${t.icon}</div>
                ${!isLast ? '<div class="tl-line"></div>' : ''}
            </div>
            <div class="tl-body">
                <div class="tl-meta">
                    <span class="tl-tipo-badge">${t.label}</span>
                    <span class="tl-datetime">${entry.data ? new Date(entry.data).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}) : ''}${entry.ora ? ' · ' + entry.ora : ''}</span>
                    <span class="tl-autore">— ${esc(entry.autore||'')}</span>
                </div>
                <div class="tl-desc">${esc(entry.descrizione||'')}</div>
            </div>
            <button onclick="deleteLogEntry('${espostoId}','${entry.id}')" title="Elimina voce" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:4px 6px;border-radius:4px;margin-top:5px;align-self:flex-start;flex-shrink:0" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-muted)'">✕</button>
        </div>`;
    };
    const tb = document.getElementById('timeline-body');
    if (tb) tb.innerHTML = logSorted.map((entry, idx) => renderEntry(entry, idx === logSorted.length - 1)).join('');
    const badge = document.getElementById('log-count-badge');
    if (badge) badge.textContent = newLog.length;
    document.getElementById('log-desc').value = '';
    document.getElementById('log-desc').focus();
    // Scrivi su Firestore
    try { await db.collection(COL).doc(espostoId).update({ log: newLog, data_modifica: e.data_modifica }); }
    catch(err) { alert('Errore salvataggio voce: ' + err.message); }
}

async function deleteLogEntry(espostoId, logId) {
    const e = state.esposti.find(x => x.id === espostoId);
    if (!e || !e.log) return;
    if (!confirm('Eliminare questa voce dal diario?')) return;
    const newLog = e.log.filter(l => l.id !== logId);
    try {
        await db.collection(COL).doc(espostoId).update({ log: newLog, data_modifica: new Date().toISOString() });
        openDetail(espostoId);
    } catch(err) { alert('Errore eliminazione voce: ' + err.message); }
}

function saveForm(id) {
    const ogg = document.getElementById('f-ogg').value.trim();
    const mitt = document.getElementById('f-mitt').value.trim();
    const arrivo = document.getElementById('f-arrivo').value;
    if (!ogg||!mitt||!arrivo) { alert('Compila i campi obbligatori: Oggetto, Mittente, Data Arrivo.'); return; }
    const data = {
        tipo: document.getElementById('f-tipo').value,
        numero_protocollo: document.getElementById('f-proto').value.trim(),
        oggetto: ogg, mittente: mitt,
        indirizzo: document.getElementById('f-addr').value.trim(),
        area: document.getElementById('f-area').value,
        stato: document.getElementById('f-stato').value,
        data_arrivo: arrivo,
        data_scadenza: document.getElementById('f-scad').value,
        priorita: document.getElementById('f-prio').value,
        assegnato_a: document.getElementById('f-off').value,
        note_interne: document.getElementById('f-note').value.trim(),
        testo_originale: document.getElementById('f-testo').value.trim(),
    };
    if (id) { updateEsposto(id, data); } else { addEsposto(data); }
    // closeModal() è chiamato dentro addEsposto/updateEsposto dopo il salvataggio
}

function _importDropCSV(evt) {
    const file = evt.dataTransfer.files[0];
    if (!file) return;
    _importCSV({ files: [file] });
}

async function _importCSV(inputEl) {
    const file = inputEl.files[0];
    if (!file) return;
    const drop = document.getElementById('csv-drop');
    const label = document.getElementById('csv-drop-label');

let _scanPages = []; // array of base64 JPEG strings

function _scanReset() {
    _scanPages = [];

    const label = document.getElementById('pdf-scan-label');

function _scanDrop(evt) {

async function _scanLoad(inputEl) {
    const file = inputEl.files[0];
    if (!file) return;
    const drop = document.getElementById('pdf-scan-drop');
    const label = document.getElementById('pdf-scan-label');
    const sub = document.getElementById('pdf-scan-sub');
    const clear = document.getElementById('pdf-scan-clear');
    const btn = document.getElementById('btn-scan-ai');
    const progress = document.getElementById('pdf-scan-progress');
    const bar = document.getElementById('pdf-scan-bar');
    const preview = document.getElementById('scan-pages-preview');

    drop.classList.remove('success','error'); drop.classList.add('loading');
    label.textContent = '⏳ Rendering pagine in corso…';
    sub.textContent = file.name;
    progress.style.display = 'block'; bar.style.width = '5%';
    clear.style.display = 'none'; btn.style.display = 'none';
    _scanPages = [];

    try {
        // Immagine diretta (JPG/PNG)
        if (file.type.startsWith('image/')) {
            const b64 = await new Promise((res, rej) => {
                const r = new FileReader();
                r.onload = () => res(r.result.split(',')[1]);
                r.onerror = rej;
                r.readAsDataURL(file);
            });
            _scanPages = [{ b64, mediaType: file.type }];
            bar.style.width = '100%';
        } else {
            // PDF → render ogni pagina su canvas
            if (!window.pdfjsLib) throw new Error('PDF.js non disponibile');
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const total = pdf.numPages;
            for (let i = 1; i <= total; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 1.8 }); // ~150dpi
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                const b64 = canvas.toDataURL('image/jpeg', 0.82).split(',')[1];
                _scanPages.push({ b64, mediaType: 'image/jpeg' });
                bar.style.width = Math.round((i / total) * 100) + '%';
            }
        }

        // Preview miniature
        preview.innerHTML = _scanPages.map((p, i) =>
            `<img src="data:${p.mediaType};base64,${p.b64}" style="height:60px;border-radius:4px;border:1px solid var(--border);object-fit:cover" title="Pagina ${i+1}">`
        ).join('');
        preview.style.display = 'flex';

        drop.classList.remove('loading'); drop.classList.add('success');
        label.textContent = `✅ ${file.name} — ${_scanPages.length} pagina${_scanPages.length>1?'e':''} pronta${_scanPages.length>1?'e':''}`;
        sub.textContent = 'Clicca "Leggi e importa" per estrarre le pratiche con AI Vision';
        progress.style.display = 'none'; bar.style.width = '0%';
        clear.style.display = 'flex'; btn.style.display = 'inline-flex';
    } catch(err) {
        drop.classList.remove('loading'); drop.classList.add('error');
        label.textContent = '❌ Errore: ' + err.message;
        sub.textContent = 'Riprova con un altro file';
        progress.style.display = 'none';
        clear.style.display = 'flex';
    }
}

async function handleImportFile(inputOrObj, type) {
    const file = inputOrObj.files[0];
    if (!file) return;
    const fb = document.getElementById('import-feedback');

    if (type === 'csv') {
        const text = await file.text();
        const lines = text.replace(/^\uFEFF/, '').split('\n').filter(l => l.trim());
        if (lines.length < 2) { showImportFeedback('error', 'File CSV vuoto o non valido.'); return; }
        const rows = lines.slice(1); // skip header
        let added = 0, skipped = 0;

        // Map CSV columns: Protocollo(0),Tipo(1),Area(2),Oggetto(3),Mittente(4),Indirizzo(5),Data Arrivo(6),Giorni(7),Scadenza(8),Stato(9),Priorità(10),Assegnato(11),Note(12)
        const parseCSVRow = (line) => {
            const result = [];
            let cur = '', inQ = false;
            for (let c of line) {
                if (c === '"') { inQ = !inQ; }
                else if (c === ';' && !inQ) { result.push(cur.replace(/""/g,'"')); cur = ''; }
                else cur += c;
            }
            result.push(cur.replace(/""/g,'"'));
            return result;
        };
        const TIPO_REV = Object.fromEntries(Object.entries(TIPI).map(([k,v])=>[v.toLowerCase(),k]));
        const AREA_REV = Object.fromEntries(Object.entries(AREAS).map(([k,v])=>[v.toLowerCase(),k]));
        const STATI_REV = Object.fromEntries(Object.entries(STATI).map(([k,v])=>[v.toLowerCase(),k]));

        const parseDate = (s) => {
            if (!s) return '';
            const m = s.match(/(\d{2})\/(\d{2})\/(\d{4})/);
            return m ? `${m[3]}-${m[2]}-${m[1]}` : s;
        };

        const batch = db.batch();
        for (const line of rows) {
            const cols = parseCSVRow(line);
            if (cols.length < 4 || !cols[3]) { skipped++; continue; }
            const proto = cols[0] || '';
            // Skip duplicati per protocollo
            if (proto && state.esposti.find(e => e.numero_protocollo === proto)) { skipped++; continue; }
            const now = new Date().toISOString();
            const docData = {
                numero_protocollo: proto,
                tipo: TIPO_REV[(cols[1]||'').toLowerCase()] || 'esposto',
                area: AREA_REV[(cols[2]||'').toLowerCase()] || 'altro',
                oggetto: cols[3] || '',
                mittente: cols[4] || '',
                indirizzo: cols[5] || '',
                data_arrivo: parseDate(cols[6]) || now.split('T')[0],
                data_scadenza: parseDate(cols[8]) || '',
                stato: STATI_REV[(cols[9]||'').toLowerCase()] || 'in_carico',
                priorita: cols[10] || 'media',
                assegnato_a: cols[11] || 'Non ancora assegnato',
                note_interne: cols[12] || '',
                testo_originale: '',
                log: [{ id: uid(), data: now.split('T')[0], ora: new Date().toTimeString().slice(0,5), tipo: 'apertura', descrizione: 'Pratica importata da CSV.', autore: 'Armando Ferrara' }],
                data_creazione: now, data_modifica: now, data_chiusura: null
            };
            batch.set(db.collection(COL).doc(uid()), docData);
            added++;
        }
        try {
            await batch.commit();
            showImportFeedback('ok', `✅ Importate ${added} pratiche${skipped ? `, ${skipped} saltate (duplicate o vuote)` : ''}.`);
        } catch(err) { showImportFeedback('error', '❌ Errore Firebase: ' + err.message); }
    }
}

function exportCSV() {
    const list = getFiltered();
    const headers = ['Protocollo','Tipo','Area','Oggetto','Mittente','Indirizzo','Data Arrivo','Giorni giacenza','Scadenza','Stato','Priorità','Assegnato','Note'];
    const rows = list.map(e => [
        e.numero_protocollo, TIPI[e.tipo], AREAS[e.area], e.oggetto, e.mittente, e.indirizzo,
        formatDate(e.data_arrivo), daysAgo(e.data_arrivo), formatDate(e.data_scadenza),
        STATI[e.stato], e.priorita, e.assegnato_a, e.note_interne
    ].map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(';'));
    const csv = [headers.join(';'), ...rows].join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = `registro_esposti_${new Date().toISOString().split('T')[0]}.csv`; a.click();
}
